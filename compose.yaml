services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: stock_market
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./create-tables.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  app1:
    build: .
    environment:
      DBUSER: root
      DBPASS: rootpassword
      DBPORT: 3306
      DBHOST: db
      APP_PORT: 2137
    depends_on:
      db:
        condition: service_healthy

  app2:
    build: .
    environment:
      DBUSER: root
      DBPASS: rootpassword
      DBPORT: 3306
      DBHOST: db
      APP_PORT: 2137
    depends_on:
      db:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${APP_EXTERNAL_PORT}:80"
    depends_on:
      - app1
      - app2

volumes:
  db_data:
