services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: stock_market

    ports:
      - "${DBPORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./create-tables.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
